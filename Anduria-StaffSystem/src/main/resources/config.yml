# ---- Dynamicke registrace commandu --------------------------
commands:
  code:
    description: "Pouzij kod."
    usage: "/code <kod>"
    permission: "anduria.staffsystem.code.use"
    aliases:
      - "code"
      - "kod"

  create-code:
    description: "Vytvor novy kod."
    usage: "/create-code <kod>"
    permission: "anduria.staffsystem.code.create"
    aliases:
      - "create-code"
      - "newcode"
      - "createcode"

  staffchat:
    description: "Odeslat zpravu do staffchatu."
    usage: "/staffchat <zprava>"
    permission: "anduria.staffsystem.staffchat"
    aliases:
      - "staffchat"
      - "sc"

  vanish:
    description: "Prepnout vanish."
    usage: "/vanish"
    permission: "anduria.staffsystem.vanish"
    aliases:
      - "vanish"
      - "v"

  nick:
    description: "Zmenit nick."
    usage: "/nick <jmeno|reset>"
    permission: "anduria.staffsystem.nick"
    aliases:
      - "nick"